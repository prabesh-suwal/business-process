server:
  port: 9008

spring:
  application:
    name: memo-service
  threads:
    virtual:
      enabled: true
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${random.value}
  datasource:
    url: jdbc:postgresql://localhost:5432/memo_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    
  # Upload limits
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# External Service URLs
services:
  workflow-service:
    url: http://localhost:9002
  form-service:
    url: http://localhost:9006
  cas-server:
    url: http://localhost:9000
  document-service:
    url: http://localhost:9010

# CAS Integration
cas:
  jwks-url: http://localhost:9000/.well-known/jwks.json
  


# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.enterprise.memo: DEBUG
    org.springframework.web: INFO

# Audit Configuration (other values have defaults in cas-common)
audit:
  service-name: memo-service
