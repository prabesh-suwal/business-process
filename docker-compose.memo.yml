# ==============================================================================
# MEMO PRODUCT — Docker Compose Overlay
# ==============================================================================
# Usage: docker compose -f docker-compose.memo.yml up -d
# ==============================================================================

include:
  - docker-compose.base.yml

services:
  memo-service:
    image: ${REGISTRY:-ghcr.io/growphasetech/business-process}/memo-service:${TAG:-latest}
    container_name: memo-service
    restart: unless-stopped
    ports:
      - "9008:9008"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      cas-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network

  # api-gateway is now in docker-compose.base.yml

  memo-ui:
    image: ${REGISTRY:-ghcr.io/growphasetech/business-process}/memo-ui:${TAG:-latest}
    container_name: memo-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - app-network
